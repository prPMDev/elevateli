<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Test Data Persistence - ElevateLI</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 20px;
      max-width: 800px;
    }
    .test-section {
      margin: 20px 0;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    .test-result {
      margin: 10px 0;
      padding: 10px;
      border-radius: 4px;
    }
    .success {
      background: #d4edda;
      color: #155724;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
    }
    .warning {
      background: #fff3cd;
      color: #856404;
    }
    button {
      margin: 5px;
      padding: 8px 16px;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
    }
    pre {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 4px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>ElevateLI Data Persistence Test</h1>
  
  <div class="test-section">
    <h2>1. Save Test Data</h2>
    <button onclick="saveTestData()">Save Test Settings</button>
    <button onclick="clearAllData()">Clear All Data</button>
    <div id="saveResult"></div>
  </div>
  
  <div class="test-section">
    <h2>2. Load and Verify Data</h2>
    <button onclick="loadAndVerifyData()">Load & Verify</button>
    <div id="loadResult"></div>
  </div>
  
  <div class="test-section">
    <h2>3. Test Partial Updates</h2>
    <button onclick="testPartialUpdate()">Test Partial Update</button>
    <div id="partialResult"></div>
  </div>
  
  <div class="test-section">
    <h2>4. Current Storage State</h2>
    <button onclick="showCurrentState()">Show Current State</button>
    <pre id="currentState"></pre>
  </div>

  <script>
    // Test data that mirrors what the popup saves
    const testData = {
      // Compliance
      compliance: {
        hasAcknowledged: true,
        acknowledgedAt: Date.now(),
        version: '1.0'
      },
      
      // User profile
      userProfile: {
        profileId: 'test-user',
        profileName: 'Test User',
        profileUrl: 'https://linkedin.com/in/test-user',
        savedAt: Date.now(),
        verifiedOwnership: true
      },
      
      // Target settings
      targetRole: 'product-manager',
      seniorityLevel: 'senior',
      customInstructions: 'Focus on leadership and product strategy',
      
      // AI settings
      enableAI: true,
      aiProvider: 'openai',
      aiModel: 'gpt-4o',
      encryptedApiKey: 'test-encrypted-key-123',
      enableVision: true,
      
      // Display settings
      showAnalysis: true,
      
      // Onboarding state
      hasSeenAISetup: true,
      onboardingState: null
    };
    
    async function saveTestData() {
      const resultDiv = document.getElementById('saveResult');
      try {
        await chrome.storage.local.set(testData);
        resultDiv.innerHTML = '<div class="test-result success">✓ Test data saved successfully</div>';
        showCurrentState();
      } catch (error) {
        resultDiv.innerHTML = `<div class="test-result error">✗ Error saving: ${error.message}</div>`;
      }
    }
    
    async function clearAllData() {
      const resultDiv = document.getElementById('saveResult');
      try {
        await chrome.storage.local.clear();
        resultDiv.innerHTML = '<div class="test-result warning">⚠️ All data cleared</div>';
        showCurrentState();
      } catch (error) {
        resultDiv.innerHTML = `<div class="test-result error">✗ Error clearing: ${error.message}</div>`;
      }
    }
    
    async function loadAndVerifyData() {
      const resultDiv = document.getElementById('loadResult');
      try {
        const data = await chrome.storage.local.get();
        
        // Verify each key setting
        const verifications = [];
        
        // Check compliance
        if (data.compliance?.hasAcknowledged) {
          verifications.push('✓ Compliance acknowledged');
        } else {
          verifications.push('✗ Compliance NOT set');
        }
        
        // Check user profile
        if (data.userProfile?.profileId) {
          verifications.push(`✓ User profile: ${data.userProfile.profileName || data.userProfile.profileId}`);
        } else {
          verifications.push('✗ User profile NOT set');
        }
        
        // Check target settings
        if (data.targetRole) {
          verifications.push(`✓ Target role: ${data.targetRole}`);
        }
        if (data.seniorityLevel) {
          verifications.push(`✓ Seniority: ${data.seniorityLevel}`);
        }
        if (data.customInstructions) {
          verifications.push(`✓ Custom instructions: "${data.customInstructions.substring(0, 30)}..."`);
        }
        
        // Check AI settings
        if (data.enableAI) {
          verifications.push('✓ AI enabled');
          if (data.aiProvider && data.aiModel) {
            verifications.push(`✓ AI model: ${data.aiProvider}:${data.aiModel}`);
          }
          if (data.encryptedApiKey || data.apiKey) {
            verifications.push('✓ API key stored');
          } else {
            verifications.push('✗ No API key found');
          }
          if (data.enableVision) {
            verifications.push('✓ Vision enabled');
          }
        } else {
          verifications.push('⚠️ AI disabled');
        }
        
        // Check display settings
        verifications.push(`✓ Show analysis: ${data.showAnalysis !== false}`);
        
        resultDiv.innerHTML = verifications.map(v => 
          `<div class="test-result ${v.startsWith('✓') ? 'success' : v.startsWith('⚠️') ? 'warning' : 'error'}">${v}</div>`
        ).join('');
        
      } catch (error) {
        resultDiv.innerHTML = `<div class="test-result error">✗ Error loading: ${error.message}</div>`;
      }
    }
    
    async function testPartialUpdate() {
      const resultDiv = document.getElementById('partialResult');
      try {
        // Test 1: Update only target role
        await chrome.storage.local.set({ targetRole: 'software-engineer' });
        let data = await chrome.storage.local.get(['targetRole', 'seniorityLevel']);
        
        const results = [];
        if (data.targetRole === 'software-engineer' && data.seniorityLevel === 'senior') {
          results.push('✓ Partial update preserved other settings');
        } else {
          results.push('✗ Partial update failed - other settings lost');
        }
        
        // Test 2: Toggle AI without losing model
        await chrome.storage.local.set({ enableAI: false });
        data = await chrome.storage.local.get(['enableAI', 'aiModel', 'aiProvider']);
        
        if (!data.enableAI && data.aiModel && data.aiProvider) {
          results.push('✓ AI toggle preserved model settings');
        } else {
          results.push('✗ AI toggle lost model settings');
        }
        
        // Test 3: Re-enable AI
        await chrome.storage.local.set({ enableAI: true });
        data = await chrome.storage.local.get(['enableAI', 'aiModel', 'encryptedApiKey']);
        
        if (data.enableAI && data.aiModel && data.encryptedApiKey) {
          results.push('✓ Re-enabling AI restored settings');
        } else {
          results.push('✗ Re-enabling AI lost settings');
        }
        
        resultDiv.innerHTML = results.map(r => 
          `<div class="test-result ${r.startsWith('✓') ? 'success' : 'error'}">${r}</div>`
        ).join('');
        
      } catch (error) {
        resultDiv.innerHTML = `<div class="test-result error">✗ Error in partial update: ${error.message}</div>`;
      }
    }
    
    async function showCurrentState() {
      const stateDiv = document.getElementById('currentState');
      try {
        const data = await chrome.storage.local.get();
        
        // Filter out sensitive data for display
        const displayData = { ...data };
        if (displayData.encryptedApiKey) {
          displayData.encryptedApiKey = '[ENCRYPTED]';
        }
        if (displayData.apiKey) {
          displayData.apiKey = '[HIDDEN]';
        }
        
        stateDiv.textContent = JSON.stringify(displayData, null, 2);
      } catch (error) {
        stateDiv.textContent = `Error: ${error.message}`;
      }
    }
    
    // Check if we're in extension context
    if (typeof chrome === 'undefined' || !chrome.storage) {
      document.body.innerHTML = '<h1>Error: This test must be run in the extension context</h1>' +
        '<p>Open this file from the extension\'s file:// URL or load it as an extension page.</p>';
    } else {
      // Show initial state
      showCurrentState();
    }
  </script>
</body>
</html>
